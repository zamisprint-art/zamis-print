    }

    <!-- ═══ FCP Preloader ═══ -->
    <style>
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #f1f5f9;
        z-index: 9999;
      }
      .loader-spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #ddd6fe;
        border-top-color: #8b5cf6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { 
        to { transform: rotate(360deg); } 
      }
      /* Cuando React monta, reemplaza todo en #root, así que el loader desaparece automáticamente */
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader">
        <div class="loader-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
